name: V2Ray Direct - 30 Minutes

on:
  workflow_dispatch:

jobs:
  run-v2ray:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Download Xray & get Public IP
        run: |
          # دانلود Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir xray-core
          unzip -q xray.zip -d xray-core
          chmod +x xray-core/xray
          rm xray.zip
          
          # گرفتن آی‌پی عمومی رانر
          PUBLIC_IP=$(curl -s ifconfig.me)
          echo "PUBLIC_IP=$PUBLIC_IP"
          echo "PUBLIC_IP=$PUBLIC_IP" >> $GITHUB_ENV

      - name: Generate random config
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "UUID=$UUID" >> $GITHUB_ENV
          PORT=$((RANDOM % 10000 + 20000))
          echo "PORT=$PORT" >> $GITHUB_ENV
          echo "Generated UUID: $UUID"
          echo "Listening port: $PORT"
          echo "Public IP: ${{ env.PUBLIC_IP }}"

      - name: Create V2Ray server config
        run: |
          cat > config.json <<EOF
          {
            "inbounds": [{
              "port": ${PORT},
              "listen": "0.0.0.0",
              "protocol": "vmess",
              "settings": {
                "clients": [{
                  "id": "${UUID}",
                  "alterId": 0
                }]
              },
              "streamSettings": {
                "network": "tcp",
                "tcpSettings": {
                  "header": {
                    "type": "none"
                  }
                }
              }
            }],
            "outbounds": [{
              "protocol": "freedom"
            }]
          }
          EOF
          cat config.json

      - name: Start Xray server
        run: |
          ./xray-core/xray run -c config.json &
          sleep 3
          # تست اینکه سرور بالا آمده
          curl -s --connect-timeout 2 telnet://${{ env.PUBLIC_IP }}:${{ env.PORT }} || echo "Port check done"

      - name: Build client config files
        run: |
          # کانفیگ JSON
          cat > client-config.json <<EOF
          {
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "${PUBLIC_IP}",
                  "port": ${PORT},
                  "users": [{
                    "id": "${UUID}",
                    "alterId": 0
                  }]
                }]
              },
              "streamSettings": {
                "network": "tcp"
              }
            }]
          }
          EOF
          
          # لینک VMess برای ایمپورت مستقیم
          VMESS_LINK="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-${PUBLIC_IP}\",\"add\":\"${PUBLIC_IP}\",\"port\":\"${PORT}\",\"id\":\"${UUID}\",\"aid\":\"0\",\"net\":\"tcp\",\"type\":\"none\"}" | base64 -w0)"
          echo "$VMESS_LINK" > vmess-link.txt
          
          echo "✅ Config files created"
          echo "Address: ${PUBLIC_IP}:${PORT}"

      - name: Commit and push
        run: |
          git add client-config.json vmess-link.txt
          git commit -m "🔄 Config ${PUBLIC_IP}:${PORT}" || echo "No changes"
          git push

      - name: Keep alive 30 minutes
        run: |
          echo "========================================"
          echo "✅ V2Ray Server is RUNNING"
          echo "📍 IP: ${PUBLIC_IP}"
          echo "🔌 Port: ${PORT}"
          echo "🔑 UUID: ${UUID}"
          echo "⏱️  Will stay alive for 30 minutes"
          echo "========================================"
          sleep 1800
          echo "⏹️ Time's up. Server shutting down."
      - name: Build client config
        run: |
          cat > client-config.json <<EOF
          {
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "${{ steps.tunnel.outputs.TUNNEL_HOST }}",
                  "port": 443,
                  "users": [{
                    "id": "${{ steps.vars.outputs.UUID }}",
                    "alterId": 0,
                    "security": "auto"
                  }]
                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "${{ steps.tunnel.outputs.TUNNEL_HOST }}"
                },
                "wsSettings": {
                  "path": "${{ steps.vars.outputs.WS_PATH }}"
                }
              }
            }]
          }
          EOF
          # لینک vmess برای ایمپورت مستقیم
          VMESS_LINK="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-Temp\",\"add\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"port\":\"443\",\"id\":\"${{ steps.vars.outputs.UUID }}\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"path\":\"${{ steps.vars.outputs.WS_PATH }}\",\"tls\":\"tls\"}" | base64 -w0)"
          echo "$VMESS_LINK" > vmess-link.txt

      - name: Commit and push config files
        run: |
          git add client-config.json vmess-link.txt
          git commit -m "🔄 New temp config (expires in 30min)" || echo "No changes"
          git push

      - name: Keep alive for 30 minutes
        run: |
          echo "✅ Server is alive. Download client-config.json or use vmess-link.txt"
          sleep 1800
          echo "⏹️ Time's up. Server will shut down."                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "${{ steps.tunnel.outputs.TUNNEL_HOST }}"
                },
                "wsSettings": {
                  "path": "${{ steps.vars.outputs.WS_PATH }}"
                }
              }
            }]
          }
          EOF
          VMESS_LINK="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-Temp\",\"add\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"port\":\"443\",\"id\":\"${{ steps.vars.outputs.UUID }}\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"path\":\"${{ steps.vars.outputs.WS_PATH }}\",\"tls\":\"tls\"}" | base64 -w0)"
          echo "$VMESS_LINK" > vmess-link.txt

      - name: Commit and push config files
        run: |
          git add client-config.json vmess-link.txt
          git commit -m "🔄 New temp config (expires in 30min)" || echo "No changes"
          git push

      - name: Keep alive for 30 minutes
        run: |
          echo "Server is alive. You can now download client-config.json"
          sleep 1800
          echo "Time's up. Server will shut down."
