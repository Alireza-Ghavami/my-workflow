name: Resilient V2Ray Server with WARP (Inspired by YT Downloader)
on:
  workflow_dispatch:
jobs:
  run-v2ray:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      # ... (مراحل اولیه checkout و تنظیم git) ...

      - name: 🚀 Start Cloudflare WARP (SOCKS5 Proxy)
        run: |
          echo "Starting WARP container..."
          docker network create warp-net 2>/dev/null || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp

          echo "⏳ Waiting for WARP to be fully ready..."
          # این بلوک دقیقاً از کد یوتیوب دانلودر شما الهام گرفته شده است
          for i in $(seq 1 20); do
            RESULT=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 \
              https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "✅ WARP is active after $i attempts!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/20 - WARP not ready, waiting 5s..."
              sleep 5
            fi
          done

          FINAL_CHECK=$(curl -s --max-time 10 --socks5-hostname 127.0.0.1:1080 \
            https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
          if echo "$FINAL_CHECK" | grep -qE "warp=(on|plus)"; then
            echo "WARP is confirmed working."
          else
            echo "⚠️ WARP might not be fully active, continuing without it..."
          fi

      - name: ⚙️ Generate Config & Start V2Ray
        run: |
          # ... (دانلود Xray، دریافت IP عمومی، تولید UUID و پورت) ...

          # ایجاد کانفیگ سرور V2Ray با خروجی از WARP SOCKS5
          cat > config.json <<EOF
          {
            "inbounds": [{
              "port": ${PORT},
              "listen": "0.0.0.0",
              "protocol": "vmess",
              "settings": {
                "clients": [{"id": "${UUID}", "alterId": 0}]
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {"path": "/graphql"}
              }
            }],
            "outbounds": [
              {
                "protocol": "socks",
                "settings": {
                  "servers": [{"address": "127.0.0.1", "port": 1080}]
                }
              }
            ]
          }
          EOF

          # اجرای Xray در پس‌زمینه
          ./xray-core/xray run -c config.json &
          sleep 3

      - name: 📁 Build & Push Client Config
        run: |
          cat > client-config.json <<EOF
          {
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "${PUBLIC_IP}",
                  "port": ${PORT},
                  "users": [{"id": "${UUID}", "alterId": 0}]
                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {"serverName": "${PUBLIC_IP}"},
                "wsSettings": {"path": "/graphql"}
              }
            }]
          }
          EOF

          VMESS_LINK="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-${PUBLIC_IP}\",\"add\":\"${PUBLIC_IP}\",\"port\":\"${PORT}\",\"id\":\"${UUID}\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"${PUBLIC_IP}\",\"path\":\"/graphql\",\"tls\":\"tls\"}" | base64 -w0)"
          echo "$VMESS_LINK" > vmess-link.txt

          # ... (کامیت و push فایل‌ها) ...

      - name: ⏱️ Keep Alive
        run: |
          echo "✅ Server is LIVE with WARP-based resilient architecture."
          sleep 1800
          echo "⏹️ Server shutting down."
