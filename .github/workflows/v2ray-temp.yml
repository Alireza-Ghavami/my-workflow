name: V2Ray 30-Minute Server

on:
  workflow_dispatch:

jobs:
  run-v2ray:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install tools & download Xray
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          # نصب cloudflared
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb
          # دانلود Xray
          curl -L -o xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir xray-core
          unzip -q xray.zip -d xray-core
          chmod +x xray-core/xray
          rm xray.zip

      - name: Generate random config
        id: vars
        run: |
          UUID=$(cat /proc/sys/kernel/random/uuid)
          echo "UUID=$UUID" >> $GITHUB_OUTPUT
          PORT=$((RANDOM % 10000 + 20000))
          echo "PORT=$PORT" >> $GITHUB_OUTPUT
          WS_PATH="/ray-$(openssl rand -hex 4)"
          echo "WS_PATH=$WS_PATH" >> $GITHUB_OUTPUT

      - name: Create V2Ray server config
        run: |
          cat > config.json <<EOF
          {
            "inbounds": [{
              "port": ${{ steps.vars.outputs.PORT }},
              "listen": "127.0.0.1",
              "protocol": "vmess",
              "settings": {
                "clients": [{
                  "id": "${{ steps.vars.outputs.UUID }}",
                  "alterId": 0
                }]
              },
              "streamSettings": {
                "network": "ws",
                "wsSettings": {
                  "path": "${{ steps.vars.outputs.WS_PATH }}"
                }
              }
            }],
            "outbounds": [{
              "protocol": "freedom"
            }]
          }
          EOF

      - name: Start Xray server
        run: |
          ./xray-core/xray run -c config.json &
          sleep 2

      - name: Start Cloudflare Tunnel & get public URL
        id: tunnel
        run: |
          # اجرای cloudflared در بک‌گراند و ذخیره خروجی
          cloudflared tunnel --url http://localhost:${{ steps.vars.outputs.PORT }} > tunnel.log 2>&1 &
          # صبر برای ایجاد تونل (حداکثر ۲۰ ثانیه)
          for i in $(seq 1 20); do
            if grep -q 'trycloudflare.com' tunnel.log; then
              break
            fi
            sleep 1
          done
          # استخراج دامنه از خروجی (مثلاً https://abc.trycloudflare.com)
          TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.trycloudflare\.com' tunnel.log | head -1)
          if [ -z "$TUNNEL_URL" ]; then
            echo "❌ Could not get tunnel URL. Full log:"
            cat tunnel.log
            exit 1
          fi
          TUNNEL_HOST=$(echo "$TUNNEL_URL" | sed 's|https://||')
          echo "Tunnel host: $TUNNEL_HOST"
          echo "TUNNEL_HOST=$TUNNEL_HOST" >> $GITHUB_OUTPUT

      - name: Build client config
        run: |
          cat > client-config.json <<EOF
          {
            "outbounds": [{
              "protocol": "vmess",
              "settings": {
                "vnext": [{
                  "address": "${{ steps.tunnel.outputs.TUNNEL_HOST }}",
                  "port": 443,
                  "users": [{
                    "id": "${{ steps.vars.outputs.UUID }}",
                    "alterId": 0,
                    "security": "auto"
                  }]
                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "${{ steps.tunnel.outputs.TUNNEL_HOST }}"
                },
                "wsSettings": {
                  "path": "${{ steps.vars.outputs.WS_PATH }}"
                }
              }
            }]
          }
          EOF
          # لینک vmess برای ایمپورت مستقیم
          VMESS_LINK="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-Temp\",\"add\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"port\":\"443\",\"id\":\"${{ steps.vars.outputs.UUID }}\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"path\":\"${{ steps.vars.outputs.WS_PATH }}\",\"tls\":\"tls\"}" | base64 -w0)"
          echo "$VMESS_LINK" > vmess-link.txt

      - name: Commit and push config files
        run: |
          git add client-config.json vmess-link.txt
          git commit -m "🔄 New temp config (expires in 30min)" || echo "No changes"
          git push

      - name: Keep alive for 30 minutes
        run: |
          echo "✅ Server is alive. Download client-config.json or use vmess-link.txt"
          sleep 1800
          echo "⏹️ Time's up. Server will shut down."                }]
              },
              "streamSettings": {
                "network": "ws",
                "security": "tls",
                "tlsSettings": {
                  "serverName": "${{ steps.tunnel.outputs.TUNNEL_HOST }}"
                },
                "wsSettings": {
                  "path": "${{ steps.vars.outputs.WS_PATH }}"
                }
              }
            }]
          }
          EOF
          VMESS_LINK="vmess://$(echo -n "{\"v\":\"2\",\"ps\":\"GitHub-Temp\",\"add\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"port\":\"443\",\"id\":\"${{ steps.vars.outputs.UUID }}\",\"aid\":\"0\",\"net\":\"ws\",\"type\":\"none\",\"host\":\"${{ steps.tunnel.outputs.TUNNEL_HOST }}\",\"path\":\"${{ steps.vars.outputs.WS_PATH }}\",\"tls\":\"tls\"}" | base64 -w0)"
          echo "$VMESS_LINK" > vmess-link.txt

      - name: Commit and push config files
        run: |
          git add client-config.json vmess-link.txt
          git commit -m "🔄 New temp config (expires in 30min)" || echo "No changes"
          git push

      - name: Keep alive for 30 minutes
        run: |
          echo "Server is alive. You can now download client-config.json"
          sleep 1800
          echo "Time's up. Server will shut down."
